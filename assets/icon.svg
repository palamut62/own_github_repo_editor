<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)" stroke="url(#accent)" stroke-width="8"/>
  <!-- GitHub-style octocat silhouette (simplified) -->
  <circle cx="256" cy="200" r="80" fill="url(#accent)" opacity="0.15"/>
  <!-- Git branch icon -->
  <g transform="translate(256,256)" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main branch line -->
    <line x1="-60" y1="-100" x2="-60" y2="100"/>
    <!-- Branch line -->
    <line x1="60" y1="-60" x2="60" y2="0"/>
    <line x1="60" y1="0" x2="-60" y2="40"/>
    <!-- Nodes -->
    <circle cx="-60" cy="-100" r="18" fill="#58a6ff" stroke="none"/>
    <circle cx="-60" cy="100" r="18" fill="#3fb950" stroke="none"/>
    <circle cx="60" cy="-60" r="18" fill="#8b5cf6" stroke="none"/>
  </g>
  <!-- Sparkle/clean indicator -->
  <g transform="translate(380,120)" fill="#f0883e">
    <polygon points="0,-20 5,-5 20,0 5,5 0,20 -5,5 -20,0 -5,-5"/>
  </g>
  <g transform="translate(350,155)" fill="#f0883e" opacity="0.6">
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3"/>
  </g>
</svg>
